version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=giko_user
      - DB_PASSWORD=giko_secure_pass
      - DB_NAME=gikomplaint
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - .:/app
    # Run the live-reload air tool
    command: ["air"]

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=giko_user
      - POSTGRES_PASSWORD=giko_secure_pass
      - POSTGRES_DB=gikomplaint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giko_user -d gikomplaint"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
